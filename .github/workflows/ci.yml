name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-fail:
    name: fast-fail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run formatting gate
        run: make fmt

      - name: Run lint gate
        run: make lint

      - name: Upload fast-fail artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-fail-artifacts
          path: artifacts
          if-no-files-found: ignore

  unit-test:
    name: unit-test
    needs: fast-fail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: make test

      - name: Upload unit-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts
          path: artifacts
          if-no-files-found: ignore

  smoke-test:
    name: smoke-test
    needs: fast-fail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run smoke test
        run: make smoke

      - name: Upload smoke-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-artifacts
          path: artifacts
          if-no-files-found: ignore

  quality:
    name: quality
    needs:
      - unit-test
      - smoke-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Assert upstream jobs passed
        run: |
          [[ "${{ needs.unit-test.result }}" == "success" ]] || exit 1
          [[ "${{ needs.smoke-test.result }}" == "success" ]] || exit 1
