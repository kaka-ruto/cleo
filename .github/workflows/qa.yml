name: qa

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SHA }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh shellcheck nodejs

      - name: Resolve PR context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          pr_number="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)"
          if [[ -z "$pr_number" || "$pr_number" == "null" ]]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Skip when no PR context
        if: steps.ctx.outputs.has_pr != 'true'
        run: |
          echo "Skipping QA run: no open PR for branch $BRANCH."

      - name: Evaluate PR QA policy
        id: policy
        if: steps.ctx.outputs.has_pr == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          set -euo pipefail
          body="$(gh pr view "$PR_NUMBER" --json body --jq .body)"

          if ! grep -q "<!-- cleo-ac:start -->" <<< "$body" || ! grep -q "<!-- cleo-ac:end -->" <<< "$body"; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_ac" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          policy="$(awk '/<!-- cleo-qa-policy:start -->/{flag=1;next}/<!-- cleo-qa-policy:end -->/{flag=0}flag' <<< "$body")"
          mode="$(awk -F: '/^mode:/{print $2; exit}' <<< "$policy" | xargs || true)"
          if [[ -z "$mode" ]]; then
            mode="auto"
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "reason=policy" >> "$GITHUB_OUTPUT"

      - name: Skip QA
        if: steps.policy.outputs.run != 'true'
        run: |
          echo "Skipping QA run: ${{ steps.policy.outputs.reason }}"

      - name: Run PR QA session
        if: steps.policy.outputs.run == 'true'
        id: runqa
        shell: bash
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          QA_MODE: ${{ steps.policy.outputs.mode }}
        run: |
          set -euo pipefail
          short_sha="$(printf "%s" "$SHA" | cut -c1-7)"
          goals="CI-gated QA run for PR #${PR_NUMBER} (${short_sha})"
          sid="$(go run ./cmd/cleo qa start --source pr --ref "$PR_NUMBER" --goals "$goals" | awk '{print $4}')"
          session_dir=".cleo/evidence/qa/session-$sid"
          mkdir -p "$session_dir"
          echo "sid=$sid" >> "$GITHUB_OUTPUT"
          echo "session_dir=$session_dir" >> "$GITHUB_OUTPUT"

          go run ./cmd/cleo qa plan --session "$sid" | tee "$session_dir/plan.txt"
          go run ./cmd/cleo qa doctor --session "$sid" | tee "$session_dir/doctor.txt"

          set +e
          go run ./cmd/cleo qa run --session "$sid" --mode "$QA_MODE" | tee "$session_dir/run.txt"
          run_status=$?
          set -e

          verdict="pass"
          if [[ "$run_status" -ne 0 ]]; then
            verdict="fail"
          fi
          go run ./cmd/cleo qa finish --session "$sid" --verdict "$verdict"
          go run ./cmd/cleo qa report --session "$sid" | tee "$session_dir/report.txt"

          exit "$run_status"

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-artifacts-${{ github.run_id }}
          path: .cleo/evidence/qa
          if-no-files-found: ignore
