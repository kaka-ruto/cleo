name: qa

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SHA }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh shellcheck nodejs

      - name: Install cleo binary
        shell: bash
        run: |
          set -euo pipefail
          version="$(gh release view --repo cafaye/cleo --json tagName --jq .tagName)"
          asset="cleo_${version}_linux_amd64.tar.gz"
          tmpdir="$(mktemp -d)"
          curl -fsSL -o "${tmpdir}/${asset}" "https://github.com/cafaye/cleo/releases/download/${version}/${asset}"
          tar -xzf "${tmpdir}/${asset}" -C "${tmpdir}"
          binary_path="$(find "${tmpdir}" -maxdepth 1 -type f -name "cleo_*_linux_amd64" | head -n 1)"
          test -n "${binary_path}"
          chmod +x "${binary_path}"
          sudo install -m 0755 "${binary_path}" /usr/local/bin/cleo
          cleo version

      - name: Resolve PR context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          pr_number="${{ github.event.pull_request.number || '' }}"
          if [[ -z "$pr_number" || "$pr_number" == "null" ]]; then
            pr_number="$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' || true)"
          fi
          if [[ -z "$pr_number" || "$pr_number" == "null" ]]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Wait for non-QA checks to pass
        if: steps.ctx.outputs.has_pr == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          set -euo pipefail
          for _ in $(seq 1 60); do
            data="$(gh pr view "$PR_NUMBER" --json statusCheckRollup --jq '.statusCheckRollup')"
            pending="$(jq '[.[] | select((.workflowName // "" | ascii_downcase) != "qa") | select((.status // "") != "COMPLETED")] | length' <<< "$data")"
            failed="$(jq '[.[] | select((.workflowName // "" | ascii_downcase) != "qa") | select((.status // "") == "COMPLETED") | select((.conclusion // "SUCCESS") != "SUCCESS" and (.conclusion // "") != "NEUTRAL")] | length' <<< "$data")"
            if [[ "$failed" -gt 0 ]]; then
              echo "Detected failing non-QA checks; aborting QA run."
              exit 1
            fi
            if [[ "$pending" -eq 0 ]]; then
              echo "Non-QA checks are green; proceeding."
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for non-QA checks to complete."
          exit 1

      - name: Skip when no PR context
        if: steps.ctx.outputs.has_pr != 'true'
        run: |
          echo "Skipping QA run: no open PR for branch $BRANCH."

      - name: Evaluate PR QA policy
        id: policy
        if: steps.ctx.outputs.has_pr == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          set -euo pipefail
          body="$(gh pr view "$PR_NUMBER" --json body --jq .body)"

          if ! grep -q "<!-- cleo-ac:start -->" <<< "$body" || ! grep -q "<!-- cleo-ac:end -->" <<< "$body"; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_ac" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          policy="$(awk '/<!-- cleo-qa-policy:start -->/{flag=1;next}/<!-- cleo-qa-policy:end -->/{flag=0}flag' <<< "$body")"
          mode="$(awk -F: '/^mode:/{print $2; exit}' <<< "$policy" | xargs || true)"
          if [[ -z "$mode" ]]; then
            mode="auto"
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "reason=policy" >> "$GITHUB_OUTPUT"

      - name: Initialize QA kit
        if: steps.policy.outputs.run == 'true'
        run: |
          cleo qa init

      - name: Skip QA
        if: steps.policy.outputs.run != 'true'
        run: |
          echo "Skipping QA run: ${{ steps.policy.outputs.reason }}"

      - name: Run PR QA session
        if: steps.policy.outputs.run == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          QA_MODE: ${{ steps.policy.outputs.mode }}
        run: |
          set -euo pipefail
          if [[ ! -f ".cleo/qa/actors/core.yml" ]]; then
            echo "Skipping QA run: missing .cleo/qa/actors/core.yml"
            exit 0
          fi
          short_sha="$(printf "%s" "$SHA" | cut -c1-7)"
          goals="CI-gated QA run for PR #${PR_NUMBER} (${short_sha})"
          sid="$(cleo qa start --source pr --ref "$PR_NUMBER" --goals "$goals" | awk '{print $4}')"

          cleo qa plan --session "$sid"
          cleo qa doctor --session "$sid"

          set +e
          cleo qa run --session "$sid" --mode "$QA_MODE"
          run_status=$?
          set -e

          verdict="pass"
          if [[ "$run_status" -ne 0 ]]; then
            verdict="fail"
          fi
          cleo qa finish --session "$sid" --verdict "$verdict"
          cleo qa report --session "$sid"

          exit "$run_status"
