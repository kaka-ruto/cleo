name: qa

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches-ignore:
      - master
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh shellcheck nodejs

      - name: Resolve PR context
        id: ctx
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
            pr_action="${{ github.event.action }}"
            pr_draft="${{ github.event.pull_request.draft }}"
          else
            branch="${GITHUB_REF#refs/heads/}"
            pr_number="$(gh pr list --head "$branch" --state open --json number --jq '.[0].number' || true)"
            pr_action="synchronize"
            pr_draft="false"
          fi

          if [[ -z "$pr_number" || "$pr_number" == "null" ]]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pr_action=$pr_action" >> "$GITHUB_OUTPUT"
          echo "pr_draft=$pr_draft" >> "$GITHUB_OUTPUT"

      - name: Skip when no PR context
        if: steps.ctx.outputs.has_pr != 'true'
        run: |
          echo "Skipping QA run: no open PR for this branch."

      - name: Skip draft PR
        if: "steps.ctx.outputs.has_pr == 'true' && steps.ctx.outputs.pr_draft == 'true'"
        run: |
          echo "Skipping QA run: PR is draft."

      - name: Evaluate PR QA policy
        id: policy
        if: "steps.ctx.outputs.has_pr == 'true' && steps.ctx.outputs.pr_draft != 'true'"
        shell: bash
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          PR_ACTION: ${{ steps.ctx.outputs.pr_action }}
        run: |
          set -euo pipefail
          body="$(gh pr view "$PR_NUMBER" --json body --jq .body)"

          if ! grep -q "<!-- cleo-ac:start -->" <<< "$body" || ! grep -q "<!-- cleo-ac:end -->" <<< "$body"; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_ac" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          policy="$(awk '/<!-- cleo-qa-policy:start -->/{flag=1;next}/<!-- cleo-qa-policy:end -->/{flag=0}flag' <<< "$body")"
          mode="$(awk -F: '/^mode:/{print $2; exit}' <<< "$policy" | xargs || true)"
          publish="$(awk -F: '/^publish:/{print $2; exit}' <<< "$policy" | xargs || true)"

          if [[ -z "$mode" ]]; then
            mode="auto"
          fi
          if [[ -z "$publish" ]]; then
            publish="pr"
          fi

          if grep -q "^run_on:" <<< "$policy"; then
            if grep -q "^[[:space:]]*-[[:space:]]*${PR_ACTION}[[:space:]]*$" <<< "$policy"; then
              should_run=true
            else
              should_run=false
            fi
          else
            case "$PR_ACTION" in
              opened|synchronize|reopened) should_run=true ;;
              *) should_run=false ;;
            esac
          fi

          echo "run=$should_run" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "reason=policy" >> "$GITHUB_OUTPUT"

      - name: Skip QA
        if: steps.policy.outputs.run != 'true'
        run: echo "Skipping QA run: ${{ steps.policy.outputs.reason }}"

      - name: Run PR QA session
        if: steps.policy.outputs.run == 'true'
        shell: bash
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          QA_MODE: ${{ steps.policy.outputs.mode }}
          QA_PUBLISH: ${{ steps.policy.outputs.publish }}
        run: |
          set -euo pipefail
          short_sha="$(printf "%s" "$SHA" | cut -c1-7)"
          goals="CI QA run for PR #${PR_NUMBER} (${short_sha})"
          sid="$(go run ./cmd/cleo qa start --source pr --ref "$PR_NUMBER" --goals "$goals" | awk '{print $4}')"
          echo "QA session: $sid"

          set +e
          go run ./cmd/cleo qa run --session "$sid" --mode "$QA_MODE"
          run_status=$?
          set -e

          verdict="pass"
          if [[ "$run_status" -ne 0 ]]; then
            verdict="fail"
          fi
          go run ./cmd/cleo qa finish --session "$sid" --verdict "$verdict"

          if [[ "$QA_PUBLISH" == "pr" ]]; then
            go run ./cmd/cleo qa report --session "$sid" --publish pr --ref "$PR_NUMBER"
          else
            go run ./cmd/cleo qa report --session "$sid"
          fi

          exit "$run_status"
