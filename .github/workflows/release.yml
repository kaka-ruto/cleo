name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (for example v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ github.event.inputs.version }}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build assets
        env:
          BINARY_NAME: cleo
          BUILD_TARGET: ./cmd/cleo
        run: scripts/release/build-assets.sh "${{ steps.version.outputs.value }}"

      - name: Verify assets
        env:
          BINARY_NAME: cleo
        run: scripts/release/verify-assets.sh "${{ steps.version.outputs.value }}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: |
            dist/release/cleo_${{ steps.version.outputs.value }}_linux_amd64.tar.gz
            dist/release/cleo_${{ steps.version.outputs.value }}_linux_arm64.tar.gz
            dist/release/cleo_${{ steps.version.outputs.value }}_darwin_amd64.tar.gz
            dist/release/cleo_${{ steps.version.outputs.value }}_darwin_arm64.tar.gz
            dist/release/checksums.txt
